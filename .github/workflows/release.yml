name: Release

# Tag a version to release everything:
#   git tag v0.1.0 && git push origin v0.1.0
# → Docker image on GHCR (:latest, :0.1.0, :0.1) and @ctxai/cli + @ctxai/mcp
#   on npm.
#
# npm auth uses Trusted Publishing (OIDC) — no token secret. One-time setup
# per package on npmjs.com: package → Settings → Trusted Publisher →
# GitHub Actions with repository "GuafterCW/CTXAI" and workflow "release.yml".
# The very first publish of a new package must be done locally
# (`npm publish --access public`), since trusted publishers can only be
# configured on existing packages.

on:
  push:
    tags: ["v*"]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC exchange for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # Trusted Publishing needs npm ≥ 11.5.1 — pin to latest to be safe.
      - run: npm install -g npm@latest

      # Both packages are dependency-free; their tests need no install.
      - run: node packages/cli/test.mjs && node packages/mcp-stdio/test.mjs

      # The tag is the single source of truth for the release version —
      # package.json versions don't need manual bumps.
      - name: Set package versions from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (cd packages/cli && npm version "$VERSION" --no-git-tag-version)
          (cd packages/mcp-stdio && npm version "$VERSION" --no-git-tag-version)

      - name: Publish @ctxai/cli
        working-directory: packages/cli
        run: npm publish

      - name: Publish @ctxai/mcp
        working-directory: packages/mcp-stdio
        run: npm publish
